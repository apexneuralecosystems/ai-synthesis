# AI Synthesis: backend (synthesis API) + frontend (React, static on 8022)
# Usage:
#   docker compose up -d
#   Backend: http://localhost:8021  Frontend: http://localhost:8022
# Set OPENAI_API_KEY and MONGODB_URI in .env or export before up.
# CORS: backend allows origin *.

services:
  backend:
    build:
      context: ./meetgeek-webhook
      dockerfile: Dockerfile
    image: ai-synthesis-backend
    ports:
      - "8021:8021"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-meetgeek}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-synthesis-frontend
    ports:
      - "8022:8022"
    restart: unless-stopped
